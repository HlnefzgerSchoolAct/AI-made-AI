<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesor — Spanish Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-top">
      <button id="new-chat-btn" class="sidebar-new-chat" title="New chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New Chat
      </button>
    </div>

    <!-- Navigation / Topics -->
    <div class="sidebar-nav" id="sidebar-topics"></div>

    <!-- Progress -->
    <div class="sidebar-bottom">
      <div id="sidebar-progress"></div>
      <div class="sidebar-actions">
        <button id="theme-toggle" class="sidebar-action-btn" title="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="clear-chat-btn" class="sidebar-action-btn" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Chat Area -->
  <main id="chat-area">
    <!-- Top bar -->
    <header id="chat-header">
      <button id="sidebar-toggle" class="header-menu-btn" title="Open menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-center">
        <span class="header-model">Profesor</span>
        <span class="header-unit">Unidad 2A1</span>
      </div>
      <div class="header-spacer"></div>
    </header>

    <!-- Welcome Screen (shown when no messages) -->
    <div id="welcome-screen">
      <div class="welcome-content">
        <div class="welcome-logo">P</div>
        <h1 class="welcome-title">Profesor</h1>
        <p class="welcome-subtitle">Your AI Spanish tutor for Unidad 2A1 &mdash; La rutina diaria</p>
        <div class="welcome-cards">
          <button class="welcome-card" data-action="quiz me on unidad 2a1">
            <div class="welcome-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div class="welcome-card-text">
              <div class="welcome-card-title">Quiz Me</div>
              <div class="welcome-card-desc">Test your vocabulary knowledge</div>
            </div>
          </button>
          <button class="welcome-card" data-action="show unidad 2a1 vocabulary">
            <div class="welcome-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <div class="welcome-card-text">
              <div class="welcome-card-title">Vocabulary</div>
              <div class="welcome-card-desc">Browse all 27 unit words</div>
            </div>
          </button>
          <button class="welcome-card" data-action="conjugate a reflexive verb">
            <div class="welcome-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            </div>
            <div class="welcome-card-text">
              <div class="welcome-card-title">Reflexive Verbs</div>
              <div class="welcome-card-desc">Master conjugation patterns</div>
            </div>
          </button>
          <button class="welcome-card" data-action="practice daily routine conversation">
            <div class="welcome-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="welcome-card-text">
              <div class="welcome-card-title">Practice</div>
              <div class="welcome-card-desc">Converse about daily routines</div>
            </div>
          </button>
          <button class="welcome-card" data-action="review flashcards">
            <div class="welcome-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <div class="welcome-card-text">
              <div class="welcome-card-title">Flashcards</div>
              <div class="welcome-card-desc">Spaced repetition review</div>
            </div>
          </button>
          <button class="welcome-card" data-action="learning path">
            <div class="welcome-card-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            </div>
            <div class="welcome-card-text">
              <div class="welcome-card-title">Learning Path</div>
              <div class="welcome-card-desc">Structured lesson progress</div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages"></div>

    <!-- Input Area -->
    <div id="chat-input-area">
      <div id="quick-actions">
        <button class="quick-btn" data-action="quiz me on unidad 2a1">Quiz Me</button>
        <button class="quick-btn" data-action="show unidad 2a1 vocabulary">Vocabulary</button>
        <button class="quick-btn" data-action="conjugate a reflexive verb">Reflexive Verbs</button>
        <button class="quick-btn" data-action="practice daily routine conversation">Practice</button>
        <button class="quick-btn" data-action="review flashcards">Flashcards</button>
        <button class="quick-btn" data-action="help">Help</button>
      </div>
      <div id="chat-input-bar">
        <textarea id="chat-input" placeholder="Message Profesor..." rows="1"></textarea>
        <button id="chat-send" title="Send" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Scripts (dependency order) -->
  <script src="js/nlp/entities.js"></script>
  <script src="js/nlp/context.js"></script>
  <script src="js/nlp/analyzer.js"></script>
  <script src="js/spanish/dictionary.js"></script>
  <script src="js/spanish/conjugation.js"></script>
  <script src="js/spanish/grammar.js"></script>
  <script src="js/spanish/phrases.js"></script>
  <script src="js/knowledge/intents.js"></script>
  <script src="js/knowledge/responses.js"></script>
  <script src="js/quiz/quiz.js"></script>
  <script src="js/quiz/progress.js"></script>
  <script src="js/learning/paths.js"></script>
  <script src="js/learning/srs.js"></script>
  <script src="js/api/config.js"></script>
  <script src="js/api/client.js"></script>
  <script src="js/api/prompts.js"></script>
  <script src="js/conversation.js"></script>
  <script src="js/ui/chat.js"></script>
  <script src="js/ui/sidebar.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
